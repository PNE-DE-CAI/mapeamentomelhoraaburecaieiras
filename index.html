<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>URE Caieiras · Sistema de Observação Educacional</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
/* ── RESET & BASE ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:      #d32f2f;
  --red-dark: #b71c1c;
  --red-light:#ffebee;
  --blue:     #0a2f6c;
  --blue-mid: #1565c0;
  --blue-light:#e3f0ff;
  --gray-50:  #f8f9fb;
  --gray-100: #f0f2f5;
  --gray-200: #e0e4e9;
  --gray-300: #c8cdd6;
  --gray-400: #9aa0ac;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
  --white:    #ffffff;
  --green:    #2e7d32;
  --amber:    #e65100;
}
body{
  background:var(--gray-50);
  color:var(--gray-900);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  font-size:14px;
  line-height:1.5
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--gray-100)}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}

/* ── HEADER ────────────────────────────────────────────── */
#header{
  background:var(--blue);
  padding:0 28px;
  display:flex;align-items:stretch;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(10,47,108,.25);
  min-height:64px
}
.header-left{display:flex;align-items:center;gap:16px}

/* Logo SVG inline — escudo URE Caieiras */
.logo-wrap{
  display:flex;align-items:center;gap:0;
  padding:10px 0;flex-shrink:0
}
.logo-shield{
  width:44px;height:50px;position:relative;flex-shrink:0
}

.header-brand{display:flex;flex-direction:column;justify-content:center}
.header-title{
  font-weight:800;font-size:16px;
  color:#fff;letter-spacing:.2px;line-height:1.2
}
.header-sup{
  font-size:10px;font-weight:600;
  color:rgba(255,255,255,.6);
  text-transform:uppercase;letter-spacing:1.5px;margin-top:3px
}

.header-right{display:flex;align-items:center;gap:12px}
.fb-badge{
  padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;
  color:#fff;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);white-space:nowrap;
  letter-spacing:.3px
}

/* Faixa vermelha abaixo do header */
.header-stripe{
  height:4px;
  background:linear-gradient(90deg, var(--red) 0%, #ef5350 50%, var(--red) 100%);
}

/* ── NAV ───────────────────────────────────────────────── */
#nav{
  background:var(--white);
  border-bottom:1px solid var(--gray-200);
  padding:0 28px;
  display:flex;gap:0;overflow-x:auto;
  box-shadow:0 1px 4px rgba(0,0,0,.06)
}
.nav-btn{
  background:none;border:none;cursor:pointer;
  padding:15px 22px;font-size:13px;font-weight:600;
  color:var(--gray-500);border-bottom:3px solid transparent;
  transition:all .18s;white-space:nowrap;font-family:inherit;
  letter-spacing:.2px
}
.nav-btn:hover{color:var(--blue);background:var(--gray-50)}
.nav-btn.active{color:var(--blue);border-bottom:3px solid var(--red);font-weight:700}

/* ── MAIN ──────────────────────────────────────────────── */
#main{padding:28px;max-width:1440px;margin:0 auto}

/* ── SUMMARY CARDS ─────────────────────────────────────── */
.card-row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;margin-bottom:28px
}
.summary-card{
  background:var(--white);
  border:1px solid var(--gray-200);
  border-radius:10px;
  padding:18px 16px;
  display:flex;flex-direction:column;gap:7px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  transition:box-shadow .18s
}
.summary-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.card-icon{font-size:20px}
.card-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.card-label{color:var(--gray-500);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}

/* ── SECTION ───────────────────────────────────────────── */
.section{margin-bottom:32px}
.section-title{
  font-size:15px;font-weight:800;color:var(--blue);
  margin-bottom:14px;letter-spacing:.2px;
  display:flex;align-items:center;gap:10px
}
.section-title::before{
  content:'';display:block;width:4px;height:18px;
  background:var(--red);border-radius:2px;flex-shrink:0
}

/* ── PROGRESS BAR ──────────────────────────────────────── */
.progress-wrap{
  height:34px;border-radius:8px;overflow:hidden;
  background:var(--gray-100);display:flex;border:1px solid var(--gray-200)
}
.progress-seg{
  height:100%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;
  transition:width .7s cubic-bezier(.4,0,.2,1);min-width:0;overflow:hidden
}
.legend{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;color:var(--gray-500);font-size:12px;font-weight:500}
.legend-dot{width:12px;height:12px;border-radius:3px;display:inline-block;flex-shrink:0}

/* ── TABLES ────────────────────────────────────────────── */
.table-wrap{
  overflow-x:auto;border-radius:10px;
  border:1px solid var(--gray-200);
  box-shadow:0 1px 4px rgba(0,0,0,.05)
}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--white)}
thead{position:sticky;top:0;z-index:2}
th{
  background:var(--blue);color:rgba(255,255,255,.9);font-weight:700;
  padding:11px 14px;text-align:left;font-size:11px;
  white-space:nowrap;letter-spacing:.5px;text-transform:uppercase
}
th:first-child{border-radius:9px 0 0 0}
th:last-child{border-radius:0 9px 0 0}
tr{border-bottom:1px solid var(--gray-100)}
tr:last-child{border-bottom:none}
tr:hover td{background:#f0f4ff}
td{padding:10px 14px;color:var(--gray-700);vertical-align:middle}
tbody tr:nth-child(even) td{background:var(--gray-50)}
tbody tr:nth-child(even):hover td{background:#f0f4ff}

/* ── MINI BAR ──────────────────────────────────────────── */
.mini-bar-wrap{display:flex;align-items:center;gap:9px;min-width:110px}
.mini-bar-bg{width:70px;height:7px;background:var(--gray-200);border-radius:4px;overflow:hidden;flex-shrink:0}
.mini-bar-fill{height:100%;border-radius:4px;transition:width .6s}

/* ── FAROL ─────────────────────────────────────────────── */
.farol-badge{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:20px;padding:4px 12px;font-weight:700;font-size:12px;
  border-width:1px;border-style:solid
}
.farol-dot{
  width:32px;height:32px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;border-width:2px;border-style:solid
}

/* ── FORM PANEL ────────────────────────────────────────── */
.form-panel{
  background:var(--white);
  border:1px solid var(--gray-200);border-radius:12px;
  padding:26px;margin-bottom:22px;
  box-shadow:0 2px 12px rgba(10,47,108,.08)
}
.form-title{
  color:var(--blue);margin-bottom:20px;
  font-weight:800;font-size:15px;
  display:flex;align-items:center;gap:8px
}
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:16px
}
label.field{
  display:flex;flex-direction:column;gap:6px;
  color:var(--gray-500);font-size:11px;font-weight:700;
  letter-spacing:.6px;text-transform:uppercase
}
input,select,textarea{
  background:var(--white);
  border:1.5px solid var(--gray-200);
  border-radius:8px;padding:9px 12px;
  color:var(--gray-900);font-size:13px;outline:none;
  transition:border .18s,box-shadow .18s;
  font-family:inherit;width:100%
}
input:focus,select:focus,textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(10,47,108,.1)
}
textarea{resize:vertical}
select{cursor:pointer}

.equiv-box{
  background:var(--blue-light);
  border:1px solid #b3cce8;border-radius:8px;
  padding:11px 16px;font-size:13px;margin-top:14px;
  line-height:1.7;color:var(--blue)
}

/* ── BUTTONS ───────────────────────────────────────────── */
.btn-primary{
  background:var(--red);
  border:none;border-radius:8px;padding:10px 22px;
  color:#fff;font-weight:700;font-size:13px;cursor:pointer;
  font-family:inherit;letter-spacing:.3px;
  transition:background .18s,transform .1s,box-shadow .18s;
  box-shadow:0 2px 8px rgba(211,47,47,.3)
}
.btn-primary:hover{background:var(--red-dark);box-shadow:0 4px 14px rgba(211,47,47,.4)}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{
  background:var(--white);border:1.5px solid var(--gray-300);border-radius:8px;
  padding:10px 18px;color:var(--gray-700);font-weight:600;
  font-size:13px;cursor:pointer;font-family:inherit;
  transition:border-color .18s,background .18s
}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.btn-edit{
  background:var(--blue-light);border:1px solid #b3cce8;
  border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;
  transition:background .15s
}
.btn-edit:hover{background:#c5d9f0}
.btn-delete{
  background:#fff0f0;border:1px solid #ffcdd2;
  border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;
  transition:background .15s
}
.btn-delete:hover{background:#ffcdd2}

/* ── FILTERS ───────────────────────────────────────────── */
.filter-row{
  display:flex;gap:10px;flex-wrap:wrap;
  align-items:center;margin-bottom:16px;
  background:var(--white);border:1px solid var(--gray-200);
  border-radius:10px;padding:14px 16px;
  box-shadow:0 1px 4px rgba(0,0,0,.04)
}
.filter-row input,.filter-row select{flex:1;min-width:160px;max-width:300px}
.count-badge{
  color:var(--gray-500);font-size:12px;font-weight:600;
  white-space:nowrap;padding:4px 12px;background:var(--gray-100);border-radius:20px
}

/* ── IMPORT PANEL ──────────────────────────────────────── */
.import-panel{
  background:var(--blue-light);
  border:1px solid #b3cce8;border-radius:12px;
  padding:20px;margin-bottom:20px
}
.import-title{color:var(--blue);font-weight:800;font-size:14px;margin-bottom:10px}
.import-hint{color:var(--gray-500);font-size:12px;margin-bottom:10px;line-height:1.7}
code{
  background:var(--blue);color:#fff;
  padding:2px 8px;border-radius:4px;font-size:11px;
  font-family:'Courier New',monospace
}

/* ── BADGES ────────────────────────────────────────────── */
.nivel-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}

/* ── EMPTY ─────────────────────────────────────────────── */
.empty-state{
  text-align:center;padding:80px 20px;
  color:var(--gray-400);font-size:15px
}
.empty-state .big{font-size:56px;margin-bottom:16px}
.empty-state strong{color:var(--blue)}

/* ── TOP ROW ───────────────────────────────────────────── */
.top-row{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:22px
}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── LOADING BAR ───────────────────────────────────────── */
#loading-bar{
  position:fixed;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),#ef5350,var(--blue-mid),var(--red));
  background-size:300% 100%;
  z-index:999;display:none;
  animation:loadmove 1.4s linear infinite
}
@keyframes loadmove{0%{background-position:0%}100%{background-position:300%}}

/* ── DIVIDER CARD (Dashboard) ──────────────────────────── */
.dash-section-header{
  display:flex;align-items:center;gap:12px;
  margin:28px 0 16px;padding-bottom:10px;
  border-bottom:2px solid var(--gray-200)
}
.dash-section-header .pill{
  background:var(--blue);color:#fff;
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px
}

/* ── RESPONSIVE ────────────────────────────────────────── */
@media(max-width:640px){
  #header{padding:0 16px}
  #nav{padding:0 12px}
  #main{padding:16px}
  .form-grid{grid-template-columns:1fr}
  .card-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="loading-bar"></div>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<div id="header">
  <div class="header-left">
    <div class="logo-wrap">
      <!-- Escudo URE Caieiras: azul escuro + vermelho + branco -->
      <svg class="logo-shield" viewBox="0 0 44 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Escudo base -->
        <path d="M22 2 L42 10 L42 28 C42 39 22 48 22 48 C22 48 2 39 2 28 L2 10 Z" fill="#fff" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
        <!-- Faixa vermelha diagonal -->
        <path d="M22 2 L42 10 L42 28 C42 39 22 48 22 48 C22 48 2 39 2 28 L2 10 Z" fill="#0a2f6c"/>

        <text x="22" y="44" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="rgba(255,255,255,.7)">✦</text>

    </div>
    <div style="width:1px;height:36px;background:rgba(255,255,255,.15);margin:0 4px"></div>
    <div class="header-brand">

  <div class="header-right">
    <div class="fb-badge" id="fb-badge">⏳ Iniciando</div>
  </div>
</div>
<div class="header-stripe"></div>

<!-- ══ NAV ════════════════════════════════════════════════ -->
<div id="nav">
  <button class="nav-btn active" onclick="showTab('dashboard')">
    <i class="fas fa-chart-bar" style="margin-right:7px;opacity:.75"></i>Dashboard
  </button>
  <button class="nav-btn" onclick="showTab('meta')">
    <i class="fas fa-table" style="margin-right:7px;opacity:.75"></i>Meta Análise
  </button>
</div>

<!-- ══ MAIN ═══════════════════════════════════════════════ -->
<div id="main">
  <div id="tab-dashboard"></div>
  <div id="tab-meta" style="display:none"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// FIREBASE CONFIG — substitua pelos dados do seu projeto
// ═══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "COLE_SUA_API_KEY_AQUI",
  authDomain: "COLE_SEU_AUTH_DOMAIN_AQUI",
  projectId: "COLE_SEU_PROJECT_ID_AQUI",
  storageBucket: "COLE_SEU_STORAGE_BUCKET_AQUI",
  messagingSenderId: "COLE_SEU_SENDER_ID_AQUI",
  appId: "COLE_SEU_APP_ID_AQUI"
};

// ═══════════════════════════════════════════════
// DADOS ESTÁTICOS
// ═══════════════════════════════════════════════
const SCHOOLS = [
  "CARLOS AUGUSTO DE PADUA FLEURY PROF","PEDRO GALRAO DO NASCIMENTO","WALTHER WEISZFLOG",
  "FRANCISCO GONCALVES VIEIRA PROF","JOSE ROBERTO MELCHIOR DR","WALTER RIBAS DE ANDRADE PROF EE",
  "ALFRIED THEODOR WEISZFLOG","ELCIO JOSE PEREIRA COTRIM PROF","JOAQUIM MARQUES DA SILVA SOBRINHO TTE",
  "ODARICO OLIVEIRA NASCIMENTO PROF","JOSE PARADA PROFESSOR","NAIR HANNICKEL ROMARO",
  "NIDE ZAIM CARDOSO PROFA","LENITA CORREA CAMARGO PROFA","JARDIM SAO FRANCISCO",
  "DOMINGOS CAMBIAGHI PROF","ARTHUR WEINGRILL","OTTO WEISZFLOG",
  "HERMELINA DE ALBUQUERQUE PASSARELLA PROFA","ULYSSES SANCHES RAMIRES PROF","ARMANDO SESTINI",
  "PEDRO PAULO DE AGUIAR","ALBINO FIORE","OZILDE ALBUQUERQUE PASSARELLA DR",
  "ELVIRA PARADA MANGA PROFA","ALADINO POLON","LYDIA SCALET WALKER PROFA",
  "BENEDITO FAGUNDES MARQUES","BUENO DE AZEVEDO FILHO PROF","ALBERTO GRAF CAPITAO",
  "MARIA ZEZA GOMES DE OLIVEIRA","JOSE CARLOS DA SILVA JUNIOR","BELEM DA SERRA",
  "IRACI SARTORI VIEIRA DA SILVA PROFA","VINCENZO LOBASSI","APARECIDO ROBERTO TONELLOTTI PROFESSOR",
  "BENEDITO APARECIDO TAVARES PROF","CHACARA CAMPONESA JARDIM VASSOURAS","JOSE DE BARROS MARTINS EDITOR",
  "BAIRRO JUNDIAIZINHO","DR. NELSON MANZANARES","ADAIL JARBAS DUCLOS","OLINDO DARTORA DR",
  "JARDIM SILVIA II","PAULO DUARTE","LUIZ ALEXANDRE DOS SANTOS VEREADOR","ZILTON BICUDO PROF",
  "DR. MARIO TOLEDO DE MORAES","ISAURA VALENTINI HANSER PROFA","SUZANA DIAS",
  "ANA MARIA GARRIDO ORLANDIN PROFA","JARDIM ALEGRIA II","ROGERIO LEVORIN PROF",
  "IVONE DOS ANJOS DA SILVA CAMPOS PROFA","ISAURA DE MIRANDA BOTTO PROFA","PIETRO PETRI",
  "PARQUE CENTO E VINTE II","JARDIM DAS ROSAS","RITUCO MITANI PROFA",
  "CELESTINA VALENTE LENGENFELDER PROFA","AZEVEDO SOARES","PEDRO LELIS DE SOUZA PREFEITO",
  "BAIRRO DO ITAIM","AFONSO MORENO","JOCIMARA VIEIRA DA SILVA PROFA",
  "ISAIAS LUIZ MATIAZZO","KATIA MARIA TARIFA LEME TONELLI PROFA"
];
const ANOS  = ["5º Ano","6º Ano","7º Ano","8º Ano","9º Ano","1ª Série EM","2ª Série EM","3ª Série EM"];
const TURMAS= ["A","B","C","D","E","F","G","H"];
const NIVEIS= ["Abaixo do Básico","Básico","Adequado","Avançado"];

// Aprendizagem equivalente ADD → score numérico (0–13)
const EQUIV = {
  "5º Ano":      {"Abaixo do Básico":3,   "Básico":4,  "Adequado":5,  "Avançado":6},
  "6º Ano":      {"Abaixo do Básico":1.5, "Básico":5,  "Adequado":6,  "Avançado":7},
  "7º Ano":      {"Abaixo do Básico":3,   "Básico":6,  "Adequado":7,  "Avançado":8},
  "8º Ano":      {"Abaixo do Básico":4,   "Básico":7,  "Adequado":8,  "Avançado":9},
  "9º Ano":      {"Abaixo do Básico":5,   "Básico":8,  "Adequado":9,  "Avançado":10},
  "1ª Série EM": {"Abaixo do Básico":5.5, "Básico":9,  "Adequado":10, "Avançado":11},
  "2ª Série EM": {"Abaixo do Básico":6,   "Básico":10, "Adequado":11, "Avançado":12},
  "3ª Série EM": {"Abaixo do Básico":7,   "Básico":11, "Adequado":12, "Avançado":13},
};

const FAROL_COLOR = {verde:"#2e7d32", amarelo:"#e65100", vermelho:"#c62828"};
const FAROL_BG    = {verde:"#e8f5e9", amarelo:"#fff3e0", vermelho:"#ffebee"};
const FAROL_BORDER= {verde:"#a5d6a7", amarelo:"#ffcc80", vermelho:"#ef9a9a"};
const FAROL_LABEL = {verde:"Melhora",  amarelo:"Estagnado", vermelho:"Piora"};
const FAROL_ICON  = {verde:"▲",        amarelo:"■",          vermelho:"▼"};
const NIVEL_COLOR = {
  "Abaixo do Básico":{"c":"#c62828","bg":"#ffebee"},
  "Básico":           {"c":"#e65100","bg":"#fff3e0"},
  "Adequado":         {"c":"#1565c0","bg":"#e3f0ff"},
  "Avançado":         {"c":"#2e7d32","bg":"#e8f5e9"}
};

function addScore(ano,nivel){ return (EQUIV[ano]&&EQUIV[ano][nivel])?EQUIV[ano][nivel]:0; }
function ppScore(lp,mat){ return ((parseFloat(lp)||0)+(parseFloat(mat)||0))/2/100*13; }
function getFarol(nivel,ano,lp,mat){
  const d=ppScore(lp,mat)-addScore(ano,nivel);
  return d>0.5?"verde":d<-0.5?"vermelho":"amarelo";
}
function equivLabel(ano,nivel){
  const eq=EQUIV[ano]&&EQUIV[ano][nivel];
  if(eq===undefined) return "—";
  if(eq<1) return "Pré-alfabetização";
  if(eq<=9) return eq+"º Ano EF";
  return Math.round(eq-9)+"ª Série EM";
}

// STORAGE
// ═══════════════════════════════════════════════
let db=null, useFirebase=false, records=[];
const LS_KEY="ure_caieiras_v2";
function lsLoad(){try{return JSON.parse(localStorage.getItem(LS_KEY)||"[]")}catch{return[]}}
function lsSave(r){localStorage.setItem(LS_KEY,JSON.stringify(r))}

async function initStorage(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    const snap=await db.collection("meta_analise").orderBy("escola").get();
    records=snap.docs.map(d=>({id:d.id,...d.data()}));
    useFirebase=true;
    setBadge("🔥 Firebase","#d32f2f");
  }catch(e){
    records=lsLoad();
    useFirebase=false;
    setBadge("💾 Armazenamento Local","rgba(255,255,255,.15)");
  }
  renderAll();
}
function setBadge(txt,bg){
  const b=document.getElementById("fb-badge");
  b.textContent=txt; b.style.background=bg;
}
async function dbAdd(rec){
  showLoading(true);
  if(useFirebase){const ref=await db.collection("meta_analise").add(rec);records.push({id:ref.id,...rec});}
  else{const nr={...rec,id:Date.now()+"_"+Math.random().toString(36).slice(2)};records.push(nr);lsSave(records);}
  showLoading(false);
}
async function dbUpdate(id,rec){
  showLoading(true);
  if(useFirebase){await db.collection("meta_analise").doc(id).update(rec);}
  const i=records.findIndex(r=>r.id===id);
  if(i>=0)records[i]={id,...rec};
  if(!useFirebase)lsSave(records);
  showLoading(false);
}
async function dbDelete(id){
  if(!confirm("Confirmar exclusão deste registro?"))return;
  showLoading(true);
  if(useFirebase){await db.collection("meta_analise").doc(id).delete();}
  records=records.filter(r=>r.id!==id);
  if(!useFirebase)lsSave(records);
  showLoading(false);
  renderAll();
}
function showLoading(v){document.getElementById("loading-bar").style.display=v?"block":"none";}

  <div class="section">
    <div class="section-title">Por Ano / Série</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Ano / Série</th>
        <th style="color:#a5d6a7">▲ Melhora</th>
        <th style="color:#ffcc80">■ Estagnado</th>
        <th style="color:#ef9a9a">▼ Piora</th>
        <th>Total</th>
        <th>% Melhora</th>
      </tr></thead>
      <tbody>
        ${ANOS.filter(a=>byAno[a]).map(a=>{
          const v=byAno[a],t2=v.verde+v.amarelo+v.vermelho;
          const p=Math.round(v.verde/t2*100);
          const bc=p>=60?"#2e7d32":p>=30?"#e65100":"#c62828";
          return`<tr>
            <td><strong style="color:#0a2f6c">${a}</strong></td>

  <!-- POR ESCOLA -->

function card(icon,label,val,color){
  return`<div class="summary-card" style="border-top:3px solid ${color}">
    <div class="card-icon" style="color:${color}">${icon}</div>
    <div class="card-val" style="color:${color}">${val}</div>
    <div class="card-label">${label}</div>
  </div>`;
}
function pSeg(n,tot,color,lbl){
  if(!n)return"";
  const pct=Math.round(n/tot*100);
  return`<div class="progress-seg" style="width:${pct}%;background:${color}" title="${lbl}: ${n}">${pct}%</div>`;
}

function livePreview(){
  const ano=document.getElementById("f-ano")?.value||"";
  const nivel=document.getElementById("f-nivel")?.value||"";
  const lp=document.getElementById("f-lp")?.value||"";
  const mat=document.getElementById("f-mat")?.value||"";
  const el=document.getElementById("equiv-label");
  const fp=document.getElementById("farol-preview");
  if(el)el.textContent=" "+(nivel&&ano?equivLabel(ano,nivel):"—");
  if(fp){
    if(nivel&&ano&&lp&&mat){
      const f=getFarol(nivel,ano,lp,mat);
      fp.innerHTML=` &nbsp;·&nbsp; Farol: <strong style="color:${FAROL_COLOR[f]}">${FAROL_ICON[f]} ${FAROL_LABEL[f]}</strong>`;
    }else fp.innerHTML="";
  }
}

async function submitForm(){
  const rec={
    escola:document.getElementById("f-escola").value,
    anoSerie:document.getElementById("f-ano").value,
    turma:document.getElementById("f-turma").value,
    professor:document.getElementById("f-prof").value.trim(),
    addNivel:document.getElementById("f-nivel").value,
    lpPercent:document.getElementById("f-lp").value,
    matPercent:document.getElementById("f-mat").value,
    perfilAbaixoBasico:document.getElementById("f-perfil").value,
    obs:document.getElementById("f-obs").value.trim(),
  };
  if(!rec.escola||!rec.anoSerie||!rec.turma){alert("Preencha os campos obrigatórios: Escola, Ano/Série e Turma.");return;}
  if(editId){await dbUpdate(editId,rec);}else{await dbAdd(rec);}
  cancelForm();renderAll();
}

function startEdit(id){editId=id;showForm=true;renderMeta();document.getElementById("tab-meta").scrollIntoView({behavior:"smooth"});}
function cancelForm(){editId=null;showForm=false;renderMeta();}
function toggleForm(){showForm=!showForm;editId=null;renderMeta();}
function toggleImport(){showImport=!showImport;renderMeta();}

async function doImport(){
  const text=document.getElementById("import-text")?.value||"";
  const lines=text.trim().split("\n").filter(l=>l.trim());
  for(const line of lines){
    const parts=line.split(";").map(p=>p.trim());
    const[escola,anoSerie,turma,professor,addNivel,lpPercent,matPercent,perfilAbaixoBasico,...obsArr]=parts;
    if(escola&&anoSerie&&turma){
      await dbAdd({escola,anoSerie,turma,professor:professor||"",addNivel:addNivel||"",
        lpPercent:lpPercent||"",matPercent:matPercent||"",
        perfilAbaixoBasico:perfilAbaixoBasico||"Não",obs:obsArr.join(";")});
    }
  }
  showImport=false;renderAll();
}

initStorage();
</script>
